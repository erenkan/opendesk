name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (biome + tsc + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Tauri's Linux build requires webkit2gtk + app-indicator + a handful of
      # support libs. macOS runners have everything already.
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libssl-dev \
            libsoup-3.0-dev \
            patchelf \
            build-essential \
            curl wget file

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test --lib

      # Scan Cargo.lock against the RustSec advisory DB. Runs once on
      # Linux only since the advisory set is platform-independent. The
      # rustsec/audit-check action can't handle our Cargo.lock under
      # src-tauri/ (it doesn't accept working-directory on a `uses:`
      # step), so install the binary and run cargo-audit directly.
      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Security audit
        if: matrix.os == 'ubuntu-latest'
        working-directory: src-tauri
        run: cargo audit
