<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tray icon, template-style: monochrome black on transparent. macOS and
  Windows menubar/tray themes auto-invert it. Based on V1 desk + up arrow
  silhouette, tuned for 22×22 rendering.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <g fill="#000">
    <!-- Desk top -->
    <rect x="2" y="10" width="18" height="2.2" rx="0.6"/>
    <!-- Legs -->
    <rect x="6.5" y="12.2" width="1.8" height="7" rx="0.4"/>
    <rect x="13.7" y="12.2" width="1.8" height="7" rx="0.4"/>
  </g>
  <!-- Up arrow -->
  <g stroke="#000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M11 8.5 L11 3"/>
    <path d="M8.5 5.2 L11 2.7 L13.5 5.2"/>
  </g>
</svg>
